<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kan9</title>
<style>
body{margin:0;background:#111;color:#fff;font:14px sans-serif}
header{display:flex;padding:10px;background:#1b1b1b;gap:10px;align-items:center;flex-wrap:wrap;position:sticky;top:0;z-index:10}
input{flex:1;padding:8px;border-radius:4px;border:none;background:#222;color:#fff}
button{padding:8px 12px;background:#ff4757;color:#fff;border:0;cursor:pointer;border-radius:4px}
#grid{display:grid;grid-template:auto/repeat(auto-fill,minmax(160px,1fr));gap:15px;padding:15px}
.card{background:#222;border-radius:8px;cursor:pointer;position:relative}
.card img{width:100%;height:220px;object-fit:cover;border-radius:8px 8px 0 0}
.fav-btn{position:absolute;top:5px;right:5px;background:rgba(0,0,0,0.6);border:0;color:gold;padding:5px;cursor:pointer;border-radius:50%}
#d{display:none;padding:20px;max-width:800px;margin:auto}
.vid{position:relative;padding-bottom:56.25%;height:0;background:#000;border-radius:8px;overflow:hidden;margin:15px 0}
.vid iframe{position:absolute;width:100%;height:100%;border:0}
.btn{display:inline-block;padding:8px;margin:5px;background:#00b894;color:#fff;text-decoration:none;border-radius:4px;font-weight:bold;cursor:pointer;border:none}
.btn.active{background:#ff4757}
.credit{font-size:12px;color:#aaa;margin-top:10px;padding:5px}
#episodes-container{margin-top:15px;max-height:200px;overflow-y:auto;background:#222;padding:10px;border-radius:8px}
</style>

<!-- ONESIGNAL NOTIFICATION ENGINE SETUP -->
<script src="https://onesignal.com" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "YOUR_ONESIGNAL_APP_ID", // <-- Switch this string with your real OneSignal App ID
      safari_web_id: "web.onesignal.auto.064be486-da22-487b-8212-32b0051174c6",
      notifyButton: { enable: true }
    });
  });
</script>
</head>
<body>
<header>
    <h3 onclick="location.reload()" style="cursor:pointer;margin:0 10px 0 0">Kan9</h3>
    <input id="q" placeholder="Search...">
    <button onclick="search()">Search</button>
    <button onclick="loadSeasonal()">Seasonal</button>
    <button onclick="showFavorites()">⭐ Favorites</button>
</header>

<div id="d">
    <button onclick="closeDetails()">Back</button>
    <h2 id="t_txt"></h2>
    <div class="vid"><iframe id="tr" allowfullscreen src=""></iframe></div>
    
    <div style="font-weight:bold; margin-top:10px;">Select Episode:</div>
    <div id="episodes-container">Searching for watchable episodes...</div>

    <p id="s"></p>
    <div class="credit">Alternative Platforms:</div>
    <div id="l"></div>
</div>

<div id="grid">Loading titles...</div>

<script>
let favs = JSON.parse(localStorage.getItem('favs') || '[]');

function closeDetails() {
    document.getElementById('d').style.display = 'none';
    document.getElementById('tr').src = '';
}

// Bypasses Jikan blocks by converting external server data models to your local uniform layout parameters
async function loadHomeBackup() {
    try {
        let res = await fetch('https://vercel.app');
        let j = await res.json();
        
        let normalizedData = j.results.map(item => ({
            title: item.title,
            mal_id: item.id,
            synopsis: "Currently broadcasting. Select watch option above to load tracking playback frames.",
            images: { jpg: { image_url: item.image } }
        }));
        render(normalizedData);
    } catch(e) {
        console.error("Home backup routing crash:", e);
        document.getElementById('grid').innerHTML = '<div style="padding:20px">All server routing nodes are congested. Please try refreshing shortly.</div>';
    }
}

async function load(u, isHome = false){
    try {
        let res = await fetch(u);
        if(!res.ok && isHome) {
            loadHomeBackup();
            return;
        }
        let j = await res.json();
        render(j.data);
    } catch(e) { 
        console.error("Load error:", e); 
        if(isHome) {
            loadHomeBackup();
        } else {
            document.getElementById('grid').innerHTML = '<div style="padding:20px">Search service rate-limited. Try again in a few seconds.</div>';
        }
    }
}

function render(data){
    const grid = document.getElementById('grid');
    grid.innerHTML='';
    if(!data || data.length === 0) {
        grid.innerHTML = '<div style="padding:20px">No results found.</div>';
        return;
    }
    data.forEach(a=>{
        let t=a.title_english||a.title;
        let c=document.createElement('div');
        c.className='card';
        c.innerHTML=`<img src="${a.images?.jpg?.image_url || a.images?.jpg?.large_image_url}"><div style="padding:10px"><b>${t}</b></div><button class="fav-btn">⭐</button>`;
        
        c.querySelector('.fav-btn').onclick = (e) => {
            e.stopPropagation();
            toggleFav(a);
        };
        c.onclick=(e)=>{
            if(e.target.tagName!=='BUTTON') show(a,t);
        };
        grid.appendChild(c);
    });
}

function toggleFav(a){
    let id = a.mal_id;
    if(favs.find(f=>f.mal_id===id)) favs = favs.filter(f=>f.mal_id!==id);
    else favs.push(a);
    localStorage.setItem('favs', JSON.stringify(favs));
    alert('Updated Favorites!');
}

function showFavorites(){ render(favs); }
function search(){ load('https://jikan.moe' + encodeURIComponent(document.getElementById('q').value)); }
function loadSeasonal(){ load('https://jikan.moe'); }

async function show(a, t) {
    const d = document.getElementById('d');
    const t_txt = document.getElementById('t_txt');
    const s = document.getElementById('s');
    const tr = document.getElementById('tr');
    const l = document.getElementById('l');
    const epContainer = document.getElementById('episodes-container');

    d.style.display = 'block';
    t_txt.innerText = t;
    s.innerText = a.synopsis || 'No synopsis available.';
    tr.src = ''; 
    
    epContainer.innerHTML = "Searching for active streaming links...";

    let platforms = [
        ['Crunchyroll', 'https://crunchyroll.com'],
        ['YouTube (Official)', 'https://youtube.com'],
        ['Netflix', 'https://netflix.com']
    ];
    l.innerHTML = platforms.map(p => {
        let query = t;
        if (p === 'YouTube (Official)') query = t + ' official episode';
        return `<a class="btn" target="_blank" href="${p + encodeURIComponent(query)}">${p}</a>`;
    }).join('');
    
    window.scrollTo(0, 0);

    // Dynamic extraction engine utilizing explicit parameters
    let searchId = a.mal_id;
    if (typeof searchId === 'string') {
        // Already contains a parsed backup query signature link directly
        loadVideoPlayer(searchId, tr, epContainer);
    } else {
        try {
            let searchRes = await fetch(`https://vercel.app{encodeURIComponent(t)}`);
            let searchData = await searchRes.json();
            
            if (searchData.results && searchData.results.length > 0) {
                loadVideoPlayer(searchData.results[0].id, tr, epContainer);
            } else {
                // Instantly fall back to automated zero-setup backup source mirror tracking frame mapping
                tr.src = `https://vidsrc.me{a.mal_id}`;
                epContainer.innerHTML = "Loaded streaming player from secondary direct backup server.";
            }
        } catch (err) {
            tr.src = `https://vidsrc.me{a.mal_id}`;
            epContainer.innerHTML = "Loaded streaming player from secondary direct backup server.";
        }
    }
}

async function loadVideoPlayer(animeId, trElement, containerElement) {
    try {
        let infoRes = await fetch(`https://vercel.app{animeId}`);
        let infoData = await infoRes.json();
        
        if (infoData.episodes && infoData.episodes.length > 0) {
            containerElement.innerHTML = '';
            
            infoData.episodes.forEach(ep => {
                let btn = document.createElement('button');
                btn.className = 'btn';
                btn.innerText = `Ep ${ep.number}`;
                btn.onclick = async () => {
                    document.querySelectorAll('#episodes-container .btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    
                    try {
                        let streamRes = await fetch(`https://vercel.app{ep.id}`);
                        let streamData = await streamRes.json();
                        
                        if (streamData.headers && streamData.headers.Referer) {
                            trElement.src = streamData.headers.Referer;
                        } else if (streamData.sources && streamData.sources.length > 0) {
                            trElement.src = streamData.sources[0].url; 
                        }
                    } catch (err) {
                        trElement.src = `https://unbxd.cc{ep.id}`;
                    }
                };
                containerElement.appendChild(btn);
            });
            containerElement.firstChild.click();
        } else {
            containerElement.innerHTML = "No watchable episodes cataloged.";
        }
    } catch(e) {
        trElement.src = `https://vidsrc.me{animeId}`;
        containerElement.innerHTML = "Loaded streaming player from backup mirror panel.";
    }
}

// Initial entry sequence loader
window.addEventListener('DOMContentLoaded', () => {
    load('https://jikan.moe', true);
});
</script>
